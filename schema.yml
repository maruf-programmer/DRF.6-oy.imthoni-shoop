components:
  schemas:
    AuthStatusEnum:
      enum:
      - new
      - code_verify
      - change_info
      - done
      type: string
      description: |-
        * `new` - new
        * `code_verify` - code_verify
        * `change_info` - change_info
        * `done` - done
    AuthTypeEnum:
      enum:
      - via_phone
      - via_email
      type: string
      description: |-
        * `via_phone` - via_phone
        * `via_email` - via_email
    Cart:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total_price:
          type: number
          format: double
          readOnly: true
      required:
      - id
      - items
      - total_price
    CartItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
        product_title:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - id
      - product
      - product_price
      - product_title
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        parent:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
      - updated_at
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          description: Eski parol
        new_password:
          type: string
          writeOnly: true
          description: Yangi parol
        confirm_password:
          type: string
          writeOnly: true
          description: Yangi parolni tasdiqlang
      required:
      - confirm_password
      - new_password
      - old_password
    ChangeProfileInfo:
      type: object
      properties:
        first_name:
          type: string
          description: Ism
          maxLength: 100
        last_name:
          type: string
          description: Familiya
          maxLength: 100
        password:
          type: string
          writeOnly: true
          description: Yangi parol (kamida 8 belgi, raqam va harf)
        confirm_password:
          type: string
          writeOnly: true
          description: Parolni tasdiqlash (yuqoridagi parol bilan bir xil bo'lishi
            kerak)
        user_role:
          type: string
          description: 'Rol: ordinary_user (oddiy), seller (sotuvchi), admin (administrator)'
          maxLength: 100
      required:
      - confirm_password
      - first_name
      - last_name
      - password
      - user_role
    ForgotPassword:
      type: object
      properties:
        email_or_phone:
          type: string
          writeOnly: true
          description: Parolni tiklash uchun email yoki telefon
      required:
      - email_or_phone
    Login:
      type: object
      properties:
        email_or_phone:
          type: string
          writeOnly: true
          description: Email yoki telefon raqam
        password:
          type: string
          writeOnly: true
          description: Parol
      required:
      - email_or_phone
      - password
    Logout:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
      required:
      - refresh
    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        message:
          type: string
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - message
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        user_email:
          type: string
          format: email
          nullable: true
          readOnly: true
        status:
          $ref: '#/components/schemas/OrderStatusEnum'
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - items
      - total_price
      - user
      - user_email
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          allOf:
          - $ref: '#/components/schemas/Product'
          readOnly: true
        quantity:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        total_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
      required:
