      - auth_status
      - auth_type
      - email_or_phone
      - id
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    UploadProfilePhoto:
      type: object
      properties:
        photo:
          type: string
          format: uri
          description: Profil uchun rasm (jpg, png)
      required:
      - photo
    UserRoleEnum:
      enum:
      - ordinary_user
      - seller
      - admin
      type: string
      description: |-
        * `ordinary_user` - ordinary_user
        * `seller` - seller
        * `admin` - admin
    VerifyCode:
      type: object
      properties:
        email_or_phone:
          type: string
          writeOnly: true
          description: Email yoki telefon raqam (ro'yxatdan o'tishdagi bilan bir xil)
        code:
          type: string
          writeOnly: true
          description: Email/SMS orqali kelgan 4 xonali kod
          maxLength: 4
      required:
      - code
      - email_or_phone
    Wishlist:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/WishlistItem'
          readOnly: true
      required:
      - id
      - items
    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        product:
          type: string
          format: uuid
        product_title:
          type: string
          readOnly: true
      required:
      - id
      - product
      - product_title
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
